<!DOCTYPE html>
<html class="cp-app-noscroll">
<head>
    <meta content="text/html; charset=utf-8" http-equiv="content-type"/>

    <link href="/customize/src/pre-loading.css?ver=1.0" rel="stylesheet" type="text/css">
    <script async data-bootload="/drive/inner.js" data-main="/common/sframe-boot.js?ver=1.11" src="/components/requirejs/require.js?ver=2.3.7"></script>
    
    <style>
        .loading-hidden { display: none; }
        #editor1 { display: none; }
        .cp-contextmenu { display: none; }

        /* --- VARIABLES DE THÈME & DIMENSIONS --- */
        :root {
            --banner-width: 48px; /* Largeur pour contenir les boutons de 40px + padding */
            --primary-bg-subtle: color-mix(in oklab, var(--primary-color) 10%, transparent);
            --primary-color: #4A90E2;
            --muted-text: #6b7280;
            --muted-hover-bg: #f3f4f6;
            --foreground-text: #1f2937;
            --border-color: rgba(128, 128, 128, 0.3);
            --bg-color: #ffffff;
        }

        /* Support du Mode Sombre si CryptPad l'utilise */
        @media (prefers-color-scheme: dark) {
            :root {
                --muted-text: #9ca3af;
                --muted-hover-bg: #374151;
                --foreground-text: #f9fafb;
                --bg-color: #262626;
                --primary-color: #fafafa;
            }
        }

        /* --- LAYOUT GLOBAL FLEXBOX --- */
        body.cp-body-drive {
            display: flex !important;
            flex-direction: row !important;
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        /* Conteneur principal de l'application CryptPad */
        .cp-app-drive-content-wrapper {
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            height: 100%;
            overflow: hidden;
        }

        /* --- STYLES CONVERTIS DU BANDEAU (TAILWIND -> CSS PUR) --- */
        #verticalBanner {
            min-width: var(--banner-width);
            height: 100%;
            background-color: var(--bg-color); /* Couleur de fond du bandeau */
            border-right: 1px solid var(--border-color);
            box-sizing: border-box;
            flex-shrink: 0;
            z-index: 9999;
        }

        .nav-rail-container {
            display: flex;
            flex-direction: column;
            height: 100%;
            align-items: center;
            margin-left: 3px;
            margin-right: 3px;
        }

        /* Navigation principale (haut) */
        .nav-rail-menu {
            display: flex;
            flex-direction: column;
            flex: 1 1 0%;
            min-height: 0;
            overflow-y: auto;
            align-items: center;
            gap: 4px;
            padding: 12px 4px;
            width: 100%;
            box-sizing: border-box;
        }

        /* Cache la barre de défilement */
        .scroll-hidden::-webkit-scrollbar { display: none; }
        .scroll-hidden { -ms-overflow-style: none; scrollbar-width: none; }

        /* Elements interactifs / Boutons & Liens */
        .nav-item {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            border-radius: 6px;
            border: none;
            background: transparent;
            color: var(--muted-text);
            cursor: pointer;
            text-decoration: none;
            transition: background-color 0.15s ease, color 0.15s ease;
            box-sizing: border-box;
        }

        .nav-item:hover {
            color: var(--foreground-text);
        }

        /* Item actif (Page courante) */
        .nav-item.active {
            background-color: var(--primary-bg-subtle);
            color: var(--foreground-text);
            font-weight: 500;
        }

        /* SVG & Icônes */
        .nav-icon {
            width: 18px;
            height: 18px;
            flex-shrink: 0;
        }

        .nav-item.active .nav-icon {
            color: var(--primary-color);
        }

        /* Navigation bas (Settings, Shortcuts, Avatar) */
        .nav-rail-bottom {
            margin-top: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            padding-bottom: 12px;
            padding-left: 4px;
            padding-right: 4px;
            width: 100%;
            box-sizing: border-box;
        }

        .nav-divider {
            width: 32px;
            border-top: 1px solid var(--border-color);
            margin: 4px 0;
        }

        /* Pastille Avatar Utilisateur */
        .user-avatar {
            border-radius: 9999px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            color: #ffffff;
            overflow: hidden;
            width: 32px;
            height: 32px;
            font-size: 12px;
            flex-shrink: 0;
            background-color: rgb(234, 88, 12);
        }
        .cp-toolbar-link{
            display: none !important;
        }
        .cp-toolbar-title{
            margin: 0 !important;
            font-size: 14px !important;
        }
    </style>
</head>
